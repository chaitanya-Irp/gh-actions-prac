name: 06 - Contexts
on:
    push:
    workflow_dispatch:

jobs:
    echo-data:
        runs-on: ubuntu-latest
        steps:
            - name: Display Information
              run: |
                echo "Event name: ${{ github.event_name }}"
                echo "Ref: ${{ github.ref_name }}"
                echo "SHA: ${{ github.sha }}"
                echo "Actor: ${{ github.actor }}"
                echo "Workflow: ${{ github.workflow }}"
            
            - name: Retrieve Variables
              run: |
                echo "Printing variable names: "
                echo "My variable: ${AH_MSG}"

                echo "Accessing secrets : "
                echo "My secret : ${{ secrets.AH_SECRET }}"
                $MY_SECRET = ${{ secrets.AH_SECRET }}
                echo "Printing: $MY_SECRET"