name: 08 - Variables
on:
    push:
    workflow_dispatch:
env:
    WORKFLOW_VAR: 'I am a workflow env variable'
    OVERWRITTEN: 'I will be overwritten'
    UNDEFINED_VAR_WITH_DEFAULT: ${{ vars.UNDEFINED_VAR || 'default value' }}

jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: 'I am a Job env variable'
            OVERWRITTEN: 'I have been overwritten at Job level'
        
        steps:
            - name: Print ENV variables
              env:
                STEP_VAR: 'I am a step env variable'
                STEP_VAR2: 'I am another step variable'
              run: |
                echo "Step env var: ${{ env.STEP_VAR }}"
                echo "Step var2: ${{ env.STEP_VAR2 }}"
                
                echo "Job env var: ${{ env.JOB_VAR }}"
                echo "Workflow env var: ${{ env.WORKFLOW_VAR }}"

                echo "OVERWRITTEN: ${{ env.OVERWRITTEN }}"
             
            - name: OVERWRITTEN Step variable
              env:
                OVERWRITTEN: "I have been overwritten at step level"
              run: |
               echo "Overwritten : ${{ env.OVERWRITTEN }}"    

    echo2:
      runs-on: ubuntu-latest
      steps:
        - name: Printing vars
          run: |
            echo "REPO Variable : ${{ vars.REPOSITORY_VAR }}"
    
    echo-prod:
      runs-on: ubuntu-latest
      environment: prod
      steps:
        - name: Prinitng prod variables
          run: |
            echo "Repo var: ${{ vars.REPOSITORY_VAR }}"
            echo "Env var: ${{ vars.TARGET_VAR }}"
            echo "Env overwritten: ${{ vars.OVERWRITTEN_VAR }}"
    
    echo-stage:
        runs-on: ubuntu-latest
        environment: staging
        steps:
          - name: Printing stage
            run: |
              echo "Repo var: ${{ vars.REPOSITORY_VAR }}"
              echo "Env var: ${{ vars.TARGET_VAR }}"
              echo "Env overwritten: ${{ vars.OVERWRITTEN_VAR }}"

    echo-undefined:
        runs-on: ubuntu-latest
        steps:
          - name: Printing undefined
            run: |
             echo "Printing undefined: ${{ env.UNDEFINED_VAR_WITH_DEFAULT }}"         