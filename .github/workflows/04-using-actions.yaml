name: 04 - Using Actions
on:
    workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
              with:
                repository: ${{ github.repository }}
                ref: "main"
            
                
            - name: Printing folders
              working-directory: ./04-using-actions/react-app 
              run: |
                echo "Printing all the folders"
                ls
